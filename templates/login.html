{% extends "base.html" %}

{% block title %}Sign in — LibreVigilant{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Sign in</h1>
    <p class="auth-subtitle">LibreVigilant — CIS Controls Assessment</p>

    {% if error %}
    <div class="alert alert-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" novalidate>
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">

      <div class="field">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          autofocus
          required
          value="{{ request.form.get('email', '') }}"
        >
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <p style="margin-top: 1.5rem; font-size: 0.78rem; color: var(--text-muted); text-align: center;">
      No self-registration — contact your administrator for access.
    </p>
  </div>
</div>
{% endblock %}
