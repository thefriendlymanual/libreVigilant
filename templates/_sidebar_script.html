<script>
(function() {
  const shell = document.getElementById('shell');
  if (!shell) return;

  const collapsed = localStorage.getItem('librevig-sidebar-open') === 'false';
  applySidebarCollapsed(collapsed);

  document.getElementById('sidebarToggle').addEventListener('click', () => {
    const next = shell.dataset.sidebarCollapsed !== 'true';
    applySidebarCollapsed(next);
    localStorage.setItem('librevig-sidebar-open', next ? 'false' : 'true');
  });

  function applySidebarCollapsed(isCollapsed) {
    shell.dataset.sidebarCollapsed = isCollapsed ? 'true' : 'false';
    const icon = document.getElementById('sidebarToggleIcon');
    if (icon) icon.textContent = isCollapsed ? '›' : '‹';
  }

  document.querySelectorAll('.project-section').forEach(sec => {
    const id = sec.dataset.projectId;
    const saved = localStorage.getItem('librevig-sidebar-project-' + id);
    if (saved === 'collapsed') sec.dataset.collapsed = 'true';
  });
})();

function toggleProject(projectId) {
  const sec = document.querySelector('.project-section[data-project-id="' + projectId + '"]');
  if (!sec) return;
  const nowCollapsed = sec.dataset.collapsed !== 'true';
  sec.dataset.collapsed = nowCollapsed ? 'true' : 'false';
  localStorage.setItem('librevig-sidebar-project-' + projectId, nowCollapsed ? 'collapsed' : 'expanded');
}

function showNewAsm(projectId) {
  document.getElementById('newAsmToggle-' + projectId).style.display = 'none';
  const form = document.getElementById('newAsmForm-' + projectId);
  form.style.display = 'flex';
  form.querySelector('input[name="name"]').focus();
}

function showNewProject() {
  document.getElementById('newProjectToggle').style.display = 'none';
  const form = document.getElementById('newProjectForm');
  form.style.display = 'flex';
  form.querySelector('input[name="name"]').focus();
}
</script>
